name: Release

# 触发条件：推一个 v 开头的 tag（如 v0.1.2）时自动发 Release。
# 也可以在 GitHub 网页 Actions 页手动触发，用于"这个 tag 已经推过了，我想重跑一次"。
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.2). Must already exist."
        required: true

permissions:
  contents: write  # 发 Release 需要写权限

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # 手动触发时 checkout 指定 tag；tag push 触发时 checkout 默认就是那个 tag
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build plugin
        run: npm run build
        env:
          # 构建脚本会尝试部署到 .env.local 的 VAULT_PATH；CI 里没有这个路径，
          # 但脚本应该在找不到路径时跳过，不影响 main.js 产物生成。
          VAULT_PATH: ""

      - name: Determine tag name
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify manifest version matches tag
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          VERSION_IN_MANIFEST=$(node -p "require('./manifest.json').version")
          EXPECTED="${TAG#v}"
          if [ "$VERSION_IN_MANIFEST" != "$EXPECTED" ]; then
            echo "::error::manifest.json version ($VERSION_IN_MANIFEST) does not match tag ($EXPECTED)"
            exit 1
          fi
          echo "manifest.json version matches tag: $VERSION_IN_MANIFEST"

      - name: Compute SHA256 of artifacts
        id: sha
        run: |
          {
            echo "main_js=$(sha256sum main.js | cut -d' ' -f1)"
            echo "manifest_json=$(sha256sum manifest.json | cut -d' ' -f1)"
            echo "styles_css=$(sha256sum styles.css | cut -d' ' -f1)"
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          # 自动从 CHANGELOG 对应章节抽取 release notes（由 release-notes job 生成）。
          # 为了先验证 workflow 能跑通，这里先用一段最小模板 + SHA256。
          body: |
            Release ${{ steps.tag.outputs.name }} — auto-generated by GitHub Actions.

            ## Verify downloads

            ```
            main.js        SHA256: ${{ steps.sha.outputs.main_js }}
            manifest.json  SHA256: ${{ steps.sha.outputs.manifest_json }}
            styles.css     SHA256: ${{ steps.sha.outputs.styles_css }}
            ```

            See [CHANGELOG.md](https://github.com/ahscuml/obsidian-resurface/blob/main/CHANGELOG.md) for details.
          files: |
            main.js
            manifest.json
            styles.css
          fail_on_unmatched_files: true
